<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>簿記3級 アイコン生成</title></head>
<body style="font-family:sans-serif;padding:20px;background:#10141f;color:#e2e8f0;">
<h2 style="color:#22c55e;">簿記3級 アイコン生成</h2>
<canvas id="c192" width="192" height="192" style="border:1px solid #2a3550;margin:8px;"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #2a3550;margin:8px;width:128px;height:128px;"></canvas>
<br>
<button onclick="dl('c192','icon-192.png')" style="margin:6px;padding:8px 16px;background:#22c55e;color:#10141f;border:none;cursor:pointer;font-weight:700;">icon-192.png をダウンロード</button>
<button onclick="dl('c512','icon-512.png')" style="margin:6px;padding:8px 16px;background:#22c55e;color:#10141f;border:none;cursor:pointer;font-weight:700;">icon-512.png をダウンロード</button>
<script>
function draw(id){
  const c=document.getElementById(id); const s=c.width; const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,s,s); g.addColorStop(0,'#10141f'); g.addColorStop(1,'#16302a');
  const r=s*0.18; ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(s-r,0);ctx.quadraticCurveTo(s,0,s,r);ctx.lineTo(s,s-r);ctx.quadraticCurveTo(s,s,s-r,s);ctx.lineTo(r,s);ctx.quadraticCurveTo(0,s,0,s-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.clip();
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
  // 電卓風グリッド
  ctx.strokeStyle='rgba(34,197,94,0.18)'; ctx.lineWidth=s*0.012;
  for(let i=1;i<4;i++){ ctx.beginPath(); ctx.moveTo(s*0.2,s*(0.45+i*0.13)); ctx.lineTo(s*0.8,s*(0.45+i*0.13)); ctx.stroke(); }
  // 簿
  ctx.fillStyle='#22c55e'; ctx.font=`bold ${s*0.34}px 'Hiragino Mincho ProN',serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(34,197,94,0.5)'; ctx.shadowBlur=s*0.07;
  ctx.fillText('簿記', s*0.5, s*0.36);
  ctx.shadowBlur=0; ctx.fillStyle='#fbbf24'; ctx.font=`bold ${s*0.16}px Arial,sans-serif`;
  ctx.fillText('3級', s*0.5, s*0.68);
}
function dl(id,name){ const c=document.getElementById(id); const a=document.createElement('a'); a.download=name; a.href=c.toDataURL('image/png'); a.click(); }
draw('c192'); draw('c512');
</script>
</body>
</html>
